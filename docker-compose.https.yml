# ─────────────────────────────────────────────────────────────────────────────
# HTTPS overlay — puts Caddy (automatic Let's Encrypt TLS) in front of the app.
#
# Deploy it TOGETHER with the base prod file, and ONLY after app.clari5pay.com's
# DNS A record points at this server (Caddy needs the domain to resolve here to
# obtain a certificate):
#
#   docker compose -f docker-compose.prod.yml -f docker-compose.https.yml up -d
#
# Caddy takes over ports 80/443; the frontend becomes internal-only (Caddy proxies
# to it). Requires inbound 443 open in the EC2 security group.
# ─────────────────────────────────────────────────────────────────────────────
services:
  frontend:
    # Caddy now owns 80/443 — drop the frontend's host port mapping (internal only).
    # This build is the app.clari5pay.com portal chooser (VITE_PORTAL=app from prod.yml).
    ports: !reset []

  # ── Role portals: same codebase, built once per role (VITE_PORTAL) ──
  frontend-merchant:                 # clari5pay.com
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
        VITE_PORTAL: "merchant"
    container_name: clari5pay_ui_merchant
    restart: unless-stopped
    depends_on:
      - backend

  frontend-admin:                    # admin.clari5pay.com
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
        VITE_PORTAL: "admin"
    container_name: clari5pay_ui_admin
    restart: unless-stopped
    depends_on:
      - backend

  frontend-sa:                       # sa.clari5pay.com
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
        VITE_PORTAL: "superadmin"
    container_name: clari5pay_ui_sa
    restart: unless-stopped
    depends_on:
      - backend

  # Customer Support agent portal (served at support.clari5pay.com via Caddy).
  support:
    build:
      context: ./support-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""    # same-origin; its nginx proxies /api to the backend
    container_name: clari5pay_support
    restart: unless-stopped
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    container_name: clari5pay_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"          # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # persists the issued certificates
      - caddy_config:/config
    depends_on:
      - frontend
      - frontend-merchant
      - frontend-admin
      - frontend-sa
      - support

volumes:
  caddy_data:
  caddy_config:
