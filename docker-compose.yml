services:
  postgres:
    image: postgres:16-alpine
    container_name: clari5pay_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: clari5pay
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clari5pay_redis
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clari5pay_api
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/clari5pay
      REDIS_URL: redis://redis:6379
      SECRET_KEY: changeme-super-secret-jwt-key-32chars
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      FRONTEND_ORIGIN: http://localhost:3001
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8001
    container_name: clari5pay_ui
    ports:
      - "3001:3000"
    depends_on:
      - backend
volumes:
  pgdata:
  redisdata: