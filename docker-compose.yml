services:
  redis:
    image: redis:7-alpine
    container_name: clari5pay_redis
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clari5pay_api
    environment:
      # Database lives in AWS RDS (username + password). For LOCAL runs, edit
      # backend/.env instead — this block is only used when you run via Docker.
      DATABASE_URL: postgresql+asyncpg://postgres:PASTE_YOUR_RDS_MASTER_PASSWORD@database-1-instance-1.c76auiocst4e.eu-north-1.rds.amazonaws.com:5432/postgres
      DB_SSL: "true"
      USE_IAM_AUTH: "false"
      REDIS_URL: redis://redis:6379
      SECRET_KEY: changeme-super-secret-jwt-key-32chars
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      FRONTEND_ORIGIN: http://localhost:3001
    ports:
      - "8001:8000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8001
    container_name: clari5pay_ui
    ports:
      - "3001:3000"
    depends_on:
      - backend

  support:
    build:
      context: ./support-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8001
    container_name: clari5pay_support
    ports:
      - "3002:3002"
    depends_on:
      - backend

volumes:
  redisdata:
