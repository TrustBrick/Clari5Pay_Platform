# Toggle the Connection header for WebSocket upgrades (support chat at /api/support/ws).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets are content-addressed — cache them aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache index.html (or SPA routes) so clients always load the latest bundle.
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        # No `$uri/` term: static asset folders (e.g. /kyc/*.png) share names with SPA routes,
        # and a directory match would 301 /kyc -> /kyc/ (which has no index.html => 403) instead
        # of falling through to the SPA. Files still resolve via `$uri`.
        try_files $uri /index.html;
    }

    # Never emit our own scheme/port in a redirect — nginx builds those from `listen 3000`,
    # which leaks the internal port through Caddy as http://host:3000/...
    absolute_redirect off;
    port_in_redirect off;

    location /api {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        # WebSocket upgrade (support chat)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        # Pass the real client IP/scheme through so the backend logs the right address
        # (uvicorn --proxy-headers turns X-Forwarded-For into request.client.host).
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        client_max_body_size 12m;   # allow base64 proof/receipt image uploads
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
